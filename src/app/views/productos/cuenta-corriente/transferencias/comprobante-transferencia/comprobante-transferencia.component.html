

<div class="container pb-5">
  <div class="row">
    <div class="col-12 col-md-10 col-lg-8 px-4 px-md-auto mx-auto">
      <div class="card p-4 p-md-5 mt-4 mt-md-5">
        <div class="row">
          <div class="col-12">
            <h1 class="mb-4 mb-md-5 mt-0 comprobante">La tranferencia <br>se realizo con exito</h1>
            <p class="mb-3 text-center">
              Se transfirio un monto de  <strong>{{ cargo | pesos }}</strong> a <strong>{{ nombreDestinatario }}</strong>.
            </p>
            <p class="text-center">Enviamos el comprobante de pago a email <strong>{{ emailDestinatario }}</strong> de {{ nombreDestinatario }}, y tambien a tu email <strong>{{ datosUsuarioActual?.datosUsuario?.email }}</strong></p>
          </div>

          <hr class="mb-4 mt-2 mb-md-5 mt-md-4">

          <div class="col-12 d-flex justify-content-end flex-column flex-md-row justify-content-center">
            <button type="button" class="btn btn-secundario me-0 me-md-3 mb-3 mb-md-0" routerLink="/mibanco/productos/cuenta-corriente/ultimos-movimientos">
              <div class="d-flex align-items-center justify-content-center">
                <div class="material-symbols-outlined">
                  chevron_left
                </div>
                <div>
                  Volver
                </div>
              </div>
            </button>
            <button type="button" class="btn btn-primario" >
              <div class="d-flex align-items-center justify-content-center">
                <div class="material-symbols-outlined">
                  picture_as_pdf
                </div>
                <div>
                  Descargo comprobante
                </div>
              </div>
            </button>
          </div>
        </div>
      </div>
  </div>
</div>

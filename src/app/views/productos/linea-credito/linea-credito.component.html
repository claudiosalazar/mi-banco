<!-- Muestra resumen de transacciones de visa -->
<ng-container *ngIf="movimientosLineaDeCredito">
  <div class="container pb-5">
    <div class="row">
      <div class="col-12 px-4 px-md-auto">
        <h1>
          Línea de Crédito
          <span>N° {{numeroProducto}}</span>
        </h1>
        <div class="card p-4 mt-4">
          <div class="d-flex justify-content-between flex-column flex-md-row">
            <div class="d-flex align-items-center">
              <p class="mb-0">
                Último pago realizado el <br class="d-md-none"><strong class="tinto">{{ fechaUltimoAbono | date:"dd / MM / yyyy" }}</strong>,<br class="d-md-none"> por un valor de  <strong class="tinto">{{ ultimoMontoAbono | pesos }}</strong>.
              </p>
            </div>
            <button class="btn btn-primario mt-3 mt-md-0" (click)="mostrarPagoLineaDeCredito()">Pagar Línea de Crédito</button>
          </div>
        </div>
        <div class="card mt-4">
          <div class="p-4">
            <app-buscador-tabla [tituloBuscador]="'Buscar transacción'"></app-buscador-tabla>
          </div>
          <!-- Importacion de componente tables -->
          <div class="p-0 p-md-4 pt-md-0">
            <app-tables [id]="transaccionesLineaCredito" [mostrarPaginador]="mostrarPaginador" [nuevaClase]="'table-productos'" (datosFiltradosEvent)="handleDatosFiltrados([$event])"></app-tables>
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-container>

<!-- Muestra formulario pago -->
<ng-container *ngIf="formularioPagoLineaDeCredito">
  <app-visa-pago></app-visa-pago>
</ng-container>

<!-- Muestra comprobante de pago -->
<ng-container *ngIf="comprobantePagoLineaDeCredito">
  <app-visa-comprobante></app-visa-comprobante>
</ng-container>

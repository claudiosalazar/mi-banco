<!-- Muestra resumen de transacciones de visa -->
<ng-container *ngIf="movimientosLineaDeCredito">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <div class="mt-3 mt-md-5">
          <h1>Movimientos Línea de Crédito</h1>
          <div class="card p-4 mt-4">
            <div class="d-flex justify-content-between flex-column flex-md-row">
              <div class="d-flex align-items-center">
                <p class="mb-1">
                  Último pago realizado el <strong>{{ fechaUltimoAbono | date:"dd / MM / yyyy" }}</strong>, por un valor de  <strong>{{ ultimoMontoAbono | pesos }}</strong>.
                </p>
              </div>
              <div class="d-flex align-items-center pt-3 pt-md-0">
                <h6 class="mb-0">Pagar Línea de Crédito</h6>
                <a class="btn btn-info ms-3" (click)="mostrarPagoLineaDeCredito()">Pagar</a>
              </div>
            </div>
          </div>
          <div class="card mt-4">
            <div class="row">
              <div class="col-12 col-md-6">
                <app-buscador-tabla></app-buscador-tabla>
              </div>
            </div>
            <!-- Importacion de componente tables -->
            <div class="p-0 p-md-4">
              <app-tables [id]="transaccionesLineaCredito" [mostrarPaginador]="mostrarPaginador" (datosFiltradosEvent)="handleDatosFiltrados([$event])"></app-tables>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-container>

<!-- Muestra formulario pago -->
<ng-container *ngIf="formularioPagoLineaDeCredito">
  <app-visa-pago></app-visa-pago>
</ng-container>

<!-- Muestra comprobante de pago -->
<ng-container *ngIf="comprobantePagoLineaDeCredito">
  <app-visa-comprobante></app-visa-comprobante>
</ng-container>

<div class="container">
  <div class="row">
    <div class="col-12">
      <div class="mt-5">
        <h1>Movimientos Visa</h1>
        <div class="card p-4 mt-4">
          <div class="d-flex justify-content-between">
            <div class="d-flex align-items-center">
              <p class="mb-1">
                <!-- Último pago realizado el <strong>{{ fechaUltimoAbono | date:"dd / MM / yyyy" }}</strong>, por un valor de  <strong>{{ ultimoMontoAbono | pesos }}</strong>. -->
              </p>
            </div>
            <div class="d-flex align-items-center">
              <h6 class="mb-0">Pagar Visa</h6>
              <a class="btn btn-info ms-3" routerLink="/mibanco/transacciones/visa/pago">Pagar</a>
            </div>
          </div>
        </div>
        <div class="card p-4 mt-4">
          <div class="row">
            <div class="col-6">
              <div class="mb-5 d-flex align-items-center">
                <p class="mb-0 me-3">Buscar transacción</p>
                <form class="d-flex ml-5" role="search">
                  <input class="form-control me-2" type="search" [formControl]="campoBusqueda" aria-label="Search">
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

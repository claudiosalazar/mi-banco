<div class="container">
  <div class="row">
    <div class="mt-5">
      <h1>Saldo y últimos movimientos</h1>
    </div>
    <div class="col-12 mt-5">
      <div class="card p-4">
        <table class="table">
          <thead>
            <tr>
              <th (click)="sort('col1')">
                <span>Fecha</span>
              </th>
              <th (click)="sort('col2')">
                <span>Movimientos</span>
              </th>
              <th (click)="sort('col3')">
                <span>Cargos</span>
              </th>
              <th (click)="sort('col4')">
                <span>Abonos</span>
              </th>
              <th (click)="sort('col5')">
                <span>Saldo</span>
              </th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of displayedData">
              <td>{{ row.col1 | date:"dd / MM / yyyy" }}</td>
              <td>{{ row.col2 }}</td>
              <td><span *ngIf="row.col3 > 0">{{ row.col3 | pesos }}</span></td>
              <td><span *ngIf="row.col4 > 0">{{ row.col4 | pesos }}</span></td>
              <td><span *ngIf="row.col5 > 0">{{ row.col5 | pesos }}</span></td>
            </tr>
          </tbody>
        </table>
        <ng-template #empty></ng-template>
        <nav aria-label="Page navigation example">
          <ul class="pagination justify-content-center">
            <li class="page-item" [class.disabled]="currentPage === 1">
              <a class="page-link" href="javascript:void(0)" (click)="previousPage()">Previous</a>
            </li>
            <li class="page-item" *ngFor="let page of (data.length / pageSize | rangos); let i = index" [class.active]="i + 1 === currentPage">
              <a class="page-link" href="javascript:void(0)" (click)="goToPage(i + 1)">{{ i + 1 }}</a>
            </li>
            <li class="page-item" [class.disabled]="currentPage === (data.length / pageSize | rangos).length">
              <a class="page-link" href="javascript:void(0)" (click)="nextPage()">Next</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</div>

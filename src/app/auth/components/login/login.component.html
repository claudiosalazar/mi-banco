<main class="container-fluid">
  <div class="row no-gutters vh-100">
    <div class="col-12 col-sm-6 order-2 order-sm-1 d-flex justify-content-center align-items-center fondo-login"></div>

    <div class="col-12 col-sm-6 order-1 order-sm-2 d-flex position-relative justify-content-center align-items-center formulario-login">
      <div class="px-5">
        <div class="logo-login mb-3 mb-md-5"></div>
        <h1 class="display-5 mb-3 mb-md-5">Bienvenido a Mi Banco</h1>
        <p class="lead">Ingrese a sus datos.</p>

        <form (submit)="login()" class="form-signin">
          <div class="form-floating mb-4">
            <input class="form-control" type="text" [(ngModel)]="user.user" name="user" placeholder="user">
            <label for="user">Usuario</label>
          </div>
          <div class="form-floating mb-4">
            <input class="form-control" type="password" [(ngModel)]="user.password" name="password" placeholder="Password">
            <label for="password">Clave</label>
          </div>
          <button class="w-100 btn btn-lg" type="submit">Entrar</button>
          <p class="mt-5 mb-3 text-center">Mi Banco © 2024</p>
        </form>

      </div>
    </div>
  </div>
</main>
